<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Panini Mundial 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Russo+One&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green-dark:  #0a4a2a;
    --green-mid:   #0d6b3a;
    --green-light: #1a9e52;
    --red:         #d42b2b;
    --yellow:      #f5c518;
    --yellow2:     #ffd700;
    --white:       #ffffff;
    --card-bg:     #0c3d22;
    --card2:       #0a3020;
    --border:      #1a6b3a;
    --text:        #e8f5ee;
    --muted:       #7abf96;
    --radius:      14px;
  }
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Russo+One&family=Oswald:wght@400;600;700&display=swap');
 
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--green-dark);
    color: var(--text);
    font-family: 'Oswald', 'Arial Narrow', sans-serif;
    min-height: 100vh;
    padding-bottom: 64px;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(26,158,82,0.15) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(212,43,43,0.08) 0%, transparent 50%);
  }
 
  /* ── HEADER ─────────────────────────────────────── */
  .header {
    background: linear-gradient(160deg, #0a4a2a 0%, #0d6b3a 40%, #0a4a2a 100%);
    padding: 0;
    border-bottom: 4px solid var(--yellow);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 6px 30px rgba(0,0,0,0.6);
    overflow: hidden;
  }
 
  /* Decorative blobs like the album cover */
  .header-blobs {
    position: absolute; inset: 0; pointer-events: none; overflow: hidden;
  }
  .blob {
    position: absolute;
    border-radius: 50%;
    opacity: 0.25;
  }
  .blob1 { width:80px;height:80px;background:var(--red);top:-20px;right:30px; }
  .blob2 { width:50px;height:50px;background:var(--yellow);top:10px;right:80px; }
  .blob3 { width:60px;height:60px;background:var(--green-light);top:-10px;left:20px; }
  .blob4 { width:30px;height:30px;background:var(--red);bottom:5px;left:60px; }
  .blob5 { width:40px;height:40px;background:var(--yellow);bottom:-10px;right:10px; }
 
  .header-inner {
    position: relative;
    padding: 16px 16px 12px;
    text-align: center;
  }
 
  .header-trophy { font-size: 2rem; line-height: 1; margin-bottom: 2px; }
 
  .header-title {
    font-family: 'Bebas Neue', 'Impact', sans-serif;
    font-size: 2.8rem;
    letter-spacing: 6px;
    color: var(--white);
    line-height: 0.9;
    text-shadow: 3px 3px 0px rgba(0,0,0,0.4), 0 0 40px rgba(245,197,24,0.3);
  }
 
  .header-title span {
    color: var(--yellow);
    text-shadow: 2px 2px 0px rgba(0,0,0,0.5), 0 0 20px rgba(245,197,24,0.5);
  }
 
  .header-subtitle {
    font-family: 'Russo One', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 4px;
    color: var(--yellow);
    text-transform: uppercase;
    margin-top: 2px;
    opacity: 0.9;
  }
 
  .header-panini {
    display: inline-block;
    background: var(--yellow);
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 2px;
    padding: 2px 10px;
    border-radius: 4px;
    margin-top: 6px;
  }
 
  .mode-badge {
    display: inline-block;
    font-family: 'Oswald', sans-serif;
    font-size: 0.62rem;
    font-weight: 600;
    padding: 2px 12px;
    border-radius: 20px;
    margin-top: 6px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .mode-badge.owner { background: var(--yellow); color: #000; }
  .mode-badge.viewer { background: rgba(255,255,255,0.1); color: var(--muted); border: 1px solid var(--border); }
 
  .header-stats {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 10px;
  }
  .stat-pill {
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(245,197,24,0.3);
    border-radius: 20px;
    padding: 4px 14px;
    font-family: 'Oswald', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 1px;
  }
  .stat-pill span { color: var(--yellow); }
 
  /* ── PROGRESS ────────────────────────────────────── */
  .progress-wrap {
    background: rgba(0,0,0,0.4);
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
  }
  .progress-bar-bg {
    background: rgba(0,0,0,0.4);
    border-radius: 10px;
    height: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .progress-bar-fill {
    background: linear-gradient(90deg, var(--red), var(--yellow), var(--green-light));
    height: 100%;
    border-radius: 10px;
    transition: width 0.5s ease;
    width: 0%;
    box-shadow: 0 0 8px rgba(245,197,24,0.4);
  }
  .progress-label {
    font-family: 'Oswald', sans-serif;
    font-size: 0.68rem;
    color: var(--muted);
    text-align: right;
    margin-top: 4px;
    letter-spacing: 1px;
  }
 
  /* ── FILTERS ─────────────────────────────────────── */
  .filter-wrap {
    padding: 8px 12px;
    display: flex;
    gap: 7px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.2);
  }
  .filter-wrap::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--muted);
    font-family: 'Oswald', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 5px 16px;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .filter-btn.active {
    background: var(--yellow);
    border-color: var(--yellow);
    color: #000;
  }
 
  /* ── CONTENT ─────────────────────────────────────── */
  .content { padding: 10px 10px 0; }
 
  .section-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 4px 8px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 4px;
    color: var(--yellow);
    text-transform: uppercase;
  }
  .section-divider::before { content: '⚽'; font-size: 0.9rem; }
  .section-divider::after { content: ''; flex: 1; height: 2px; background: linear-gradient(90deg, var(--yellow), transparent); }
 
  /* ── CARDS ───────────────────────────────────────── */
  .country-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    transition: border-color 0.3s;
  }
  .country-card.completed {
    border-color: rgba(245,197,24,0.5);
    background: linear-gradient(135deg, #0c3d22, #0a4a1a);
  }
 
  .country-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    gap: 8px;
  }
 
  .country-left { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
 
  .country-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.05rem;
    letter-spacing: 2px;
    color: var(--white);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
 
  .repechaje-label {
    font-family: 'Oswald', sans-serif;
    font-size: 0.55rem;
    color: var(--yellow);
    font-weight: 700;
    letter-spacing: 1px;
    background: rgba(245,197,24,0.15);
    border: 1px solid rgba(245,197,24,0.3);
    padding: 1px 6px;
    border-radius: 4px;
    flex-shrink: 0;
    text-transform: uppercase;
  }
 
  .country-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
 
  .mini-progress { height: 4px; background: rgba(0,0,0,0.4); width: 50px; border-radius: 4px; overflow: hidden; }
  .mini-progress-fill { height: 100%; background: linear-gradient(90deg, var(--red), var(--yellow)); border-radius: 4px; transition: width 0.3s; }
 
  .badge {
    background: var(--red);
    color: white;
    border-radius: 20px;
    padding: 3px 10px;
    font-family: 'Oswald', sans-serif;
    font-size: 0.68rem;
    font-weight: 600;
    white-space: nowrap;
    letter-spacing: 1px;
  }
  .badge.done { background: var(--yellow); color: #000; }
  .badge.partial { background: var(--green-light); color: #000; }
 
  .chevron {
    color: var(--muted);
    font-size: 0.75rem;
    transition: transform 0.25s;
    display: inline-block;
  }
  .country-card.open .chevron { transform: rotate(180deg); }
 
  /* ── STICKER GRID ────────────────────────────────── */
  .sticker-grid {
    display: none;
    padding: 10px 12px 14px;
    border-top: 1px solid var(--border);
    grid-template-columns: repeat(auto-fill, minmax(52px, 1fr));
    gap: 6px;
    background: rgba(0,0,0,0.15);
  }
  .country-card.open .sticker-grid { display: grid; }
 
  .sticker-btn {
    border-radius: 10px;
    font-family: 'Oswald', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 10px 4px;
    text-align: center;
    position: relative;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
    border: 1.5px solid rgba(255,255,255,0.1);
    background: rgba(0,0,0,0.25);
    color: rgba(255,255,255,0.35);
    cursor: default;
  }
 
  /* Ya la tienes desde siempre — verde */
  .sticker-btn.owned {
    background: rgba(26,158,82,0.2);
    border-color: var(--green-light);
    color: #4ddb8a;
  }
  .sticker-btn.owned::after {
    content: '✓';
    position: absolute;
    top: 1px; right: 4px;
    font-size: 0.55rem;
    color: #4ddb8a;
  }
 
  /* Te falta — modo vista */
  .sticker-btn.missing-view {
    background: rgba(212,43,43,0.08);
    border-color: rgba(212,43,43,0.25);
    color: rgba(212,43,43,0.5);
    cursor: default;
  }
 
  /* Te falta — modo edicion (clickeable) */
  .sticker-btn.missing-edit {
    background: rgba(212,43,43,0.1);
    border-color: rgba(212,43,43,0.4);
    color: rgba(255,100,100,0.8);
    cursor: pointer;
  }
  .sticker-btn.missing-edit:active { transform: scale(0.88); }
  .sticker-btn.missing-edit:hover {
    background: rgba(245,197,24,0.15);
    border-color: var(--yellow);
    color: var(--yellow);
  }
 
  /* Faltaba pero ya la conseguiste */
  .sticker-btn.missing-got {
    background: rgba(26,158,82,0.2);
    border-color: var(--green-light);
    color: #4ddb8a;
    cursor: pointer;
  }
  .sticker-btn.missing-got::after {
    content: '✓';
    position: absolute;
    top: 1px; right: 4px;
    font-size: 0.55rem;
    color: #4ddb8a;
  }
  .sticker-btn.missing-got:active { transform: scale(0.88); }
 
  /* ── SYNC BAR ─────────────────────────────────────── */
  .sync-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: linear-gradient(135deg, #061a0e, #0a2e18);
    border-top: 2px solid var(--yellow);
    padding: 8px 16px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 99; font-size: 0.72rem;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
  }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; margin-right: 6px; display: inline-block; }
  .sync-dot.ok { background: #4ddb8a; }
  .sync-dot.loading { background: var(--yellow); animation: pulse 1s infinite; }
  .sync-dot.err { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .sync-left { display: flex; align-items: center; color: var(--muted); font-family: 'Oswald', sans-serif; letter-spacing: 1px; }
  .sync-right { display: flex; gap: 10px; }
  .sync-btn {
    background: transparent;
    border: 1px solid rgba(245,197,24,0.3);
    color: var(--yellow);
    font-family: 'Oswald', sans-serif;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 4px 14px;
    border-radius: 20px;
    cursor: pointer;
    text-transform: uppercase;
  }
  .sync-btn.danger { border-color: rgba(212,43,43,0.5); color: #ff6b6b; }
 
  /* ── MODAL ───────────────────────────────────────── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.88); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
  .modal-overlay.hidden { display: none; }
  .modal {
    background: linear-gradient(160deg, #0c3d22, #061a0e);
    border: 2px solid var(--yellow);
    border-radius: 20px;
    padding: 30px 24px;
    width: 100%; max-width: 340px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 40px rgba(245,197,24,0.1);
  }
  .modal-trophy { font-size: 2.5rem; margin-bottom: 8px; }
  .modal h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 4px;
    color: var(--yellow);
    margin-bottom: 6px;
  }
  .modal p { font-family: 'Oswald', sans-serif; font-size: 0.82rem; color: var(--muted); margin-bottom: 20px; line-height: 1.5; letter-spacing: 0.5px; }
  .modal input {
    width: 100%;
    background: rgba(0,0,0,0.4);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--white);
    font-family: 'Oswald', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 4px;
    padding: 12px 14px;
    margin-bottom: 12px;
    outline: none;
    text-align: center;
  }
  .modal input:focus { border-color: var(--yellow); }
  .modal-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--yellow), #e6b800);
    border: none;
    border-radius: 10px;
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 3px;
    padding: 13px;
    cursor: pointer;
    margin-bottom: 8px;
    box-shadow: 0 4px 15px rgba(245,197,24,0.3);
  }
  .modal-btn.secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Oswald', sans-serif;
    font-size: 0.82rem;
    letter-spacing: 1px;
    padding: 10px;
  }
  .modal-error { color: #ff6b6b; font-family: 'Oswald', sans-serif; font-size: 0.78rem; margin-bottom: 10px; min-height: 18px; letter-spacing: 0.5px; }
 
  /* ── TOAST ───────────────────────────────────────── */
  .toast {
    position: fixed; bottom: 52px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: linear-gradient(135deg, var(--green-light), #0d8a40);
    color: white;
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 0.82rem;
    letter-spacing: 1px;
    padding: 10px 22px;
    border-radius: 30px;
    z-index: 300;
    transition: transform 0.3s ease;
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(26,158,82,0.5);
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
 
  /* ── LOADING ─────────────────────────────────────── */
  .loading-screen {
    position: fixed; inset: 0;
    background: linear-gradient(160deg, #0a4a2a, #061a0e);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 500; gap: 16px;
  }
  .loading-screen.hidden { display: none; }
  .loading-trophy { font-size: 3.5rem; animation: bounce 1s ease infinite alternate; }
  @keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-10px)} }
  .loading-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 6px;
    color: var(--yellow);
    text-shadow: 0 0 30px rgba(245,197,24,0.5);
  }
  .loading-sub {
    font-family: 'Oswald', sans-serif;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(245,197,24,0.2);
    border-top-color: var(--yellow);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
 
<div class="loading-screen" id="loadingScreen">
  <div class="loading-trophy">🏆</div>
  <div class="loading-title">PANINI 2026</div>
  <div class="spinner"></div>
  <div class="loading-sub" id="loadingSub">Conectando...</div>
</div>
 
<div class="modal-overlay hidden" id="loginModal">
  <div class="modal">
    <div class="modal-trophy">🏆</div>
    <h2>Modo Edicion</h2>
    <p>Ingresa la contrasena para editar tus cartas</p>
    <div class="modal-error" id="loginError"></div>
    <input type="password" id="pinInput" placeholder="••••••••" maxlength="20">
    <button class="modal-btn" onclick="tryLogin()">Entrar</button>
    <button class="modal-btn secondary" onclick="closeLogin()">Solo ver</button>
  </div>
</div>
 
<div class="header">
  <div class="header-blobs">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
    <div class="blob blob4"></div>
    <div class="blob blob5"></div>
  </div>
  <div class="header-inner">
    <div class="header-trophy">🏆</div>
    <div class="header-title">FIFA WORLD CUP <span>2026</span></div>
    <div class="header-subtitle">Official Sticker Collection Tracker</div>
    <div class="header-panini">PANINI</div>
    <br>
    <div id="modeBadge" class="mode-badge viewer">Modo Vista</div>
    <div class="header-stats">
      <div class="stat-pill">Faltan: <span id="totalLeft">-</span></div>
      <div class="stat-pill">Tengo: <span id="totalGot">-</span></div>
    </div>
  </div>
</div>
 
<div class="progress-wrap">
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="mainProgress"></div></div>
  <div class="progress-label" id="progressLabel">Cargando...</div>
</div>
 
<div class="filter-wrap">
  <button class="filter-btn active" onclick="filterCards('all',this)">Todos</button>
  <button class="filter-btn" onclick="filterCards('pending',this)">Pendientes</button>
  <button class="filter-btn" onclick="filterCards('partial',this)">Parciales</button>
  <button class="filter-btn" onclick="filterCards('done',this)">Completos</button>
</div>
 
<div class="content" id="mainContent"></div>
 
<div class="sync-bar">
  <div class="sync-left">
    <span class="sync-dot loading" id="syncDot"></span>
    <span id="syncLabel">Conectando...</span>
  </div>
  <div class="sync-right" id="syncButtons">
    <button class="sync-btn" onclick="showLogin()">Editar</button>
  </div>
</div>
 
<div class="toast" id="toast"></div>

function buildInitialState(){
  var data={};
  for(var i=0;i<TEAMS.length;i++){
    var t=TEAMS[i];
    for(var n=1;n<=t.total;n++){
      var miss=false;
      for(var m=0;m<t.missing.length;m++){if(t.missing[m]===n){miss=true;break;}}
      data[t.id+'_'+n]=!miss;
    }
  }
  return data;
}
 
var state={};
var isOwner=false;
var db=null;
var dbRef=null;
 
function initFirebase(){
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    db=firebase.database();
    dbRef=db.ref('cartas');
    document.getElementById('loadingSub').textContent='Cargando cartas...';
    dbRef.once('value',function(snapshot){
      var data=snapshot.val();
      if(!data||Object.keys(data).length===0){
        document.getElementById('loadingSub').textContent='Preparando album...';
        var initial=buildInitialState();
        dbRef.set(initial).then(function(){state=initial;startListening();});
      } else {
        state=data; startListening();
      }
    },function(){setSyncStatus('err','Sin conexion');hide('loadingScreen');});
  }catch(e){setSyncStatus('err','Error');hide('loadingScreen');}
}
 
function startListening(){
  dbRef.on('value',function(snapshot){
    state=snapshot.val()||{};
    renderAll();
    setSyncStatus('ok','En vivo');
    hide('loadingScreen');
  });
}
 
function isMiss(team,n){for(var i=0;i<team.missing.length;i++){if(team.missing[i]===n)return true;}return false;}
function isGot(tid,n){return state[tid+'_'+n]===true;}
function countGot(t){var c=0;for(var n=1;n<=t.total;n++){if(isGot(t.id,n))c++;}return c;}
function countPending(t){var c=0;for(var i=0;i<t.missing.length;i++){if(!isGot(t.id,t.missing[i]))c++;}return c;}
function getTeam(tid){for(var i=0;i<TEAMS.length;i++){if(TEAMS[i].id===tid)return TEAMS[i];}return null;}
 
function toggle(tid,n){
  if(!isOwner){showToast('Modo vista — no puedes editar');return;}
  var team=getTeam(tid);if(!team)return;
  if(!isMiss(team,n)){showToast('Esta carta ya la tienes!');return;}
  var key=tid+'_'+n;
  var newVal=!state[key];
  state[key]=newVal;
  setSyncStatus('loading','Guardando...');
  var upd={};upd[key]=newVal;
  dbRef.update(upd).then(function(){setSyncStatus('ok','Guardado');}).catch(function(){setSyncStatus('err','Error');});
  var btn=document.getElementById('b'+tid+'n'+n);
  if(btn) btn.className='sticker-btn '+(newVal?'missing-got':'missing-edit');
  refreshCard(tid);refreshGlobal();
  if(newVal) showToast('#'+n+' conseguida! ⚽');
  else showToast('#'+n+' desmarcada');
}
 
function showLogin(){document.getElementById('pinInput').value='';document.getElementById('loginError').textContent='';show('loginModal');setTimeout(function(){document.getElementById('pinInput').focus();},200);}
function closeLogin(){hide('loginModal');}
function tryLogin(){
  var pin=document.getElementById('pinInput').value;
  if(pin===OWNER_PIN){isOwner=true;hide('loginModal');renderAll();setOwnerUI();showToast('Modo edicion activado ✓');}
  else{document.getElementById('loginError').textContent='Contrasena incorrecta';document.getElementById('pinInput').value='';}
}
document.addEventListener('keydown',function(e){if(e.key==='Enter')tryLogin();});
 
function setOwnerUI(){
  document.getElementById('modeBadge').textContent='Modo Edicion';
  document.getElementById('modeBadge').className='mode-badge owner';
  document.getElementById('syncButtons').innerHTML=
    '<button class="sync-btn danger" onclick="doLogout()">Salir</button>'+
    '<button class="sync-btn danger" onclick="confirmReset()">Reset</button>';
}
 
function doLogout(){
  isOwner=false;
  document.getElementById('modeBadge').textContent='Modo Vista';
  document.getElementById('modeBadge').className='mode-badge viewer';
  document.getElementById('syncButtons').innerHTML='<button class="sync-btn" onclick="showLogin()">Editar</button>';
  renderAll();showToast('Modo vista activado');
}
 
function confirmReset(){
  if(confirm('Reiniciar TODO el progreso de cartas conseguidas?')){
    var initial=buildInitialState();
    dbRef.set(initial).then(function(){state=initial;renderAll();showToast('Reiniciado');});
  }
}
 
function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}
function setSyncStatus(t,l){document.getElementById('syncDot').className='sync-dot '+t;document.getElementById('syncLabel').textContent=l;}
 
var tt;
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(tt);tt=setTimeout(function(){t.classList.remove('show');},2000);}
function toggleCard(tid){var c=document.getElementById('c'+tid);if(c)c.classList.toggle('open');}
 
function filterCards(type,btn){
  var btns=document.querySelectorAll('.filter-btn');
  for(var i=0;i<btns.length;i++)btns[i].classList.remove('active');
  btn.classList.add('active');
  for(var i=0;i<TEAMS.length;i++){
    var t=TEAMS[i],card=document.getElementById('c'+t.id);if(!card)continue;
    var p=countPending(t),g=countGot(t),show=true;
    if(type==='pending') show=p>0&&g===0;
    else if(type==='partial') show=p>0&&g>0;
    else if(type==='done') show=p===0;
    card.style.display=show?'':'none';
  }
}
 
function refreshCard(tid){
  var t=getTeam(tid);if(!t)return;
  var p=countPending(t),g=countGot(t),pct=Math.round(g/t.total*100);
  var card=document.getElementById('c'+tid);if(!card)return;
  var badge=card.querySelector('.badge'),fill=card.querySelector('.mini-progress-fill');
  if(p===0){badge.textContent='Completo ✓';badge.className='badge done';card.classList.add('completed');}
  else if(g>0){badge.textContent=p+' faltan';badge.className='badge partial';card.classList.remove('completed');}
  else{badge.textContent=p+' faltan';badge.className='badge';card.classList.remove('completed');}
  if(fill)fill.style.width=pct+'%';
}
 
function refreshGlobal(){
  var tl=0,tg=0,ta=0;
  for(var i=0;i<TEAMS.length;i++){tl+=countPending(TEAMS[i]);tg+=countGot(TEAMS[i]);ta+=TEAMS[i].total;}
  document.getElementById('totalLeft').textContent=tl;
  document.getElementById('totalGot').textContent=tg;
  var pct=Math.round(tg/ta*100);
  document.getElementById('mainProgress').style.width=pct+'%';
  document.getElementById('progressLabel').textContent=pct+'% — '+tg+' de '+ta+' cartas en tu album';
}
 
function buildCard(t){
  var p=countPending(t),g=countGot(t),pct=Math.round(g/t.total*100);
  var bc=p===0?'badge done':g>0?'badge partial':'badge';
  var bt=p===0?'Completo ✓':p+' faltan';
  var cc=p===0?'completed':'';
  var stk='';
  for(var n=1;n<=t.total;n++){
    var missing=isMiss(t,n),got=isGot(t.id,n);
    if(!missing){
      stk+='<button class="sticker-btn owned" id="b'+t.id+'n'+n+'">#'+n+'</button>';
    } else if(got){
      stk+='<button class="sticker-btn missing-got" id="b'+t.id+'n'+n+'" onclick="toggle(\''+t.id+'\','+n+')">#'+n+'</button>';
    } else if(isOwner){
      stk+='<button class="sticker-btn missing-edit" id="b'+t.id+'n'+n+'" onclick="toggle(\''+t.id+'\','+n+')">#'+n+'</button>';
    } else {
      stk+='<button class="sticker-btn missing-view" id="b'+t.id+'n'+n+'">#'+n+'</button>';
    }
  }
  var rl=t.rep?'<span class="repechaje-label">Repechaje</span>':'';
  return '<div class="country-card '+cc+'" id="c'+t.id+'">'
    +'<div class="country-header" onclick="toggleCard(\''+t.id+'\')">'
    +'<div class="country-left"><span class="country-name">'+t.name+'</span>'+rl+'</div>'
    +'<div class="country-right">'
    +'<div class="mini-progress"><div class="mini-progress-fill" style="width:'+pct+'%"></div></div>'
    +'<span class="'+bc+'">'+bt+'</span>'
    +'<span class="chevron">▼</span>'
    +'</div></div>'
    +'<div class="sticker-grid">'+stk+'</div>'
    +'</div>';
}
 
function renderAll(){
  var h='<div class="section-divider">Equipos Clasificados</div>';
  for(var i=0;i<TEAMS.length;i++){if(!TEAMS[i].rep)h+=buildCard(TEAMS[i]);}
  h+='<div class="section-divider">Equipos de Repechaje</div>';
  for(var i=0;i<TEAMS.length;i++){if(TEAMS[i].rep)h+=buildCard(TEAMS[i]);}
  document.getElementById('mainContent').innerHTML=h;
  refreshGlobal();
}
 
initFirebase();
</script>
